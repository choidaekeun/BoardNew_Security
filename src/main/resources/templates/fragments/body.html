<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body th:fragment="main-body">
	<div id="adm_wrap">
		<header>
	        <div class="head">
	            <h1>게시판 프로젝트</h1>
	            <div sec:authorize="isAuthenticated()" class="top_menu">
	                <div class="login_user"><strong><i class="far fa-user-circle"></i> <span sec:authentication="principal.userNm"></span></strong>님 반갑습니다.</div>
	                <div class="logout">
	                    <form action="/logout" method="post">
	                        <button type="submit"><span class="skip_info">로그아웃</span><i class="fas fa-sign-out-alt"></i></button>
	                    </form>
	                </div>
	            </div>
	        </div>
    	</header>
		
		<div id="container">
			<div class="menu_toggle"><span></span></div>
            <!--/* 좌측 영역 */-->
            <div class="lcontent">
                <!--/* 메뉴 */-->
                <nav>
                    <ul>
                        <li class="has_sub"><a href="javascript: void(0);" class="on"><span>게시판 관리</span></a>
                            <ul>
                                <li><a href="/user/post/list" class="on">리스트형</a></li>
                                <li><a href="javascript: alert('준비 중입니다.');">갤러리형</a></li>
                                <li><a href="javascript: alert('준비 중입니다.');">캘린더형</a></li>
                            </ul>
                        </li>
                        <li class="has_sub"><a href="javascript: void(0);" class="on"><span>고객센터</span></a>
                        	<ul>
                        		<li><a href="/user/chat/rooms">대화하기</a></li>
                        	</ul>
                        </li>
                        <li class="has_sub"><a href="javascript: void(0);" class="on"><span>회원 관리</span></a>
                        	<ul>
                        		<li><a href="/user/member/updateMember.do">회원정보</a></li>
                                <li><a href="/user/member/deleteMember.do">회원탈퇴</a></li>
                        	</ul>
                        </li>
                        
                    </ul>
                </nav>
            </div>
            
            <!--/* 우측 영역 */-->
            <div class="rcontent">
				
				<!--/* 페이지별 컨텐츠 */-->
				<th:block layout:fragment="content"></th:block>
				            
            </div> <!--/* // #container */-->
            <footer>Copyright(c)네임즈.All rights reserved.</footer>
		</div>
		
		<script th:src="@{/js/function.js}"></script>
		<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
		<script th:src="@{/js/common.js}"></script>
		<script src="https://kit.fontawesome.com/79613ae794.js" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
			
		<th:block layout:fragment="script"></th:block>
	</div>
</body>
</html>
