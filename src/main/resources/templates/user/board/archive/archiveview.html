<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/basic">
    <th:block layout:fragment="title">
        <title>자료실 상세</title>
    </th:block>

    <th:block layout:fragment="content">
        <div class="page_tits">
            <h3>게시판 관리</h3>
            <p class="path"><strong>현재 위치 :</strong> <span>게시판</span> <span>자료실</span> <span>상세정보</span></p>
        </div>

        <div class="content">
            <section>
                <table class="tb tb_row">
                    <colgroup>
                        <col style="width:10%;"/><col style="width:23%;"/><col style="width:10%;"/><col style="width:23%;"/>
                    </colgroup>
                    <tbody>
                        <tr>
                            <th scope="row">글 유형</th>
                            <td th:text="${archive.noticeYn ? '공지' : '일반'}"></td>
                            <th scope="row">등록일</th>
                            <td th:text="${#temporals.format(archive.createdDate, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                        <tr>
                            <th scope="row">제목</th>
                            <td th:text="${archive.title}"></td>
                            <th scope="row">조회</th>
                            <td th:text="${archive.viewCnt}"></td>
                        </tr>
                        <tr>
                            <th scope="row">이름</th>
                            <td colspan="3" th:text="${archive.writer}"></td>
                        </tr>
                        <tr>
                            <th scope="row">내용</th>
                            <td colspan="3" th:text="${archive.content}"></td>
                        </tr>
                        <tr>
                            <th scope="row">첨부파일</th>
                            <td id="files" colspan="3"></td>
                        </tr>
                    </tbody>
                </table>
                <p class="btn_set">
                    <button type="button" onclick="goWritePage();" class="btns btn_bdr4 btn_mid">수정</button>
                    <button type="button" onclick="deleteArchive();" class="btns btn_bdr1 btn_mid">삭제</button>
                    <button type="button" onclick="goListPage();" class="btns btn_bdr3 btn_mid">뒤로</button>
                </p>

                <!--/* 댓글 작성 */-->
                <div class="cm_write">
                    <fieldset>
                        <legend class="skipinfo">댓글 입력</legend>
                        <div class="cm_input">
                            <p><textarea id="content" name="content" onkeyup="countingLength(this);" cols="90" rows="4" placeholder="댓글을 입력해 주세요."></textarea></p>
                            <span><button type="button" class="btns" onclick="saveComment();">등 록</button> <i id="counter">0/300자</i></span>
                        </div>
                    </fieldset>
                </div>

                <!--/* 댓글 렌더링 영역 */-->
                <div>
                    <input type="checkbox" class="contentCheck" id="allCheck">
                    <button type="button" onclick="deleteAll();" class="btns btn_bdr1 btn_mid">삭제</button>
                </div>
                <div class="cm_list"></div>
                <div class="paging"></div>
            </section>
        </div>

        <!--/* 댓글 수정 popup */-->
        <div id="commentUpdatePopup" class="popLayer">
            <h3>댓글 수정</h3>
            <div class="pop_container">
                <table class="tb tb_row tl">
                    <colgroup>
                        <col style="width:30%;" /><col style="width:70%;" />
                    </colgroup>
                    <tbody>
                        <tr>
                            <th scope="row">작성자<span class="es">필수 입력</span></th>
                            <td><input type="text" id="modalWriter" name="modalWriter" placeholder="작성자를 입력해 주세요." /></td>
                        </tr>
                        <tr>
                            <th scope="row">내용<span class="es">필수 입력</span></th>
                            <td><textarea id="modalContent" name="modalContent" cols="90" rows="10" placeholder="수정할 내용을 입력해 주세요."></textarea></td>
                        </tr>
                    </tbody>
                </table>
                <p class="btn_set">
                    <button type="button" id="commentUpdateBtn" class="btns btn_st2">수정</button>
                    <button type="button" class="btns btn_bdr2" onclick="closeCommentUpdatePopup();">취소</button>
                </p>
            </div>
            <button type="button" class="btn_close" onclick="closeCommentUpdatePopup();"><span><i class="far fa-times-circle"></i></span></button>
        </div>
    </th:block>

    <th:block layout:fragment="script">
        <script th:inline="javascript">
        /*<![CDATA[*/

            $(document).ready(function() {
                findAllFile();
                findAllComment();

                $("#allCheck").click(function() {
                    $("input:checkbox[name='chk']").prop("checked", $(this).is(":checked"));
                });
            });

            function findAllComment(page) {
                const uriPage = new URLSearchParams(location.search).get('page');
                page = page ? page : (uriPage ? Number(uriPage) : 1);

                const boardId = [[ ${archive.boardId} ]];
                const uri = `/user/board/archives/${boardId}/comments`;
                const params = { page, recordSize: 5, pageSize: 10, boardId };

                const response = getJson(uri, params);
                drawComments(response.list);
                drawPage(response.pagination, page);
            }

            function deleteArchive() {
                const id = [[ ${archive.boardId} ]];
                if (!confirm(id + '번 게시글을 삭제할까요?')) return false;

                let inputHtml = '';
                new URLSearchParams(location.search).forEach((value, key) => {
                    inputHtml += `<input type="hidden" name="${key}" value="${value}" />`;
                });
                const $form = $(`<form id="deleteForm" action="/user/board/archive/delete" method="post">${inputHtml}</form>`);
                $('body').append($form);
                $('#deleteForm').submit();
            }

            function goWritePage() {
                location.href = '/user/board/archive/write' + location.search;
            }

            function goListPage() {
                const queryString = new URLSearchParams(location.search);
                queryString.delete('id');
                location.href = '/user/board/archive/list' + '?' + queryString.toString();
            }

            function countingLength(content) {
                const comment = $(content);
                if (comment.val().length > 300) {
                    alert('댓글을 300자 이하로 입력해 주세요.');
                    comment.val(comment.val().substring(0, 300));
                    comment.focus();
                }
                $('#counter').text(comment.val().length + '/300자');
            }

            function saveComment() {
                const content = $('#content');
                isValid(content, '댓글');

                const boardId = [[ ${archive.boardId} ]];
                const uri = `/user/board/archives/${boardId}/comments`;
                const params = { boardId, content: content.val(), writer: '홍길동' };

                callApi(uri, 'post', params);
                alert('저장되었습니다.');
                content.val('');
                $('#counter').text('0/300자');
                findAllComment(1);
            }

            function openCommentUpdatePopup(id) {
                const boardId = [[ ${archive.boardId} ]];
                const uri = `/user/board/archives/${boardId}/comments/${id}`;
                const response = getJson(uri);
                $('#modalWriter').val(response.writer);
                $('#modalContent').val(response.content);
                $('#commentUpdateBtn').attr('onclick', `updateComment(${id})`);
                layerPop('commentUpdatePopup');
            }

            function closeCommentUpdatePopup() {
                $('#modalContent, #modalWriter').val('');
                $('#commentUpdateBtn').removeAttr('onclick');
                layerPopClose('commentUpdatePopup');
            }

            function updateComment(id) {
                const writer = $('#modalWriter');
                const content = $('#modalContent');
                isValid(writer, '작성자');
                isValid(content, '수정할 내용');

                const boardId = [[ ${archive.boardId} ]];
                const uri = `/user/board/archives/${boardId}/comments/${id}`;
                const params = { commentId: id, boardId, content: content.val(), writer: writer.val() };

                callApi(uri, 'patch', params);
                alert('수정되었습니다.');
                closeCommentUpdatePopup();
                findAllComment();
            }

            function deleteComment(id) {
                if (!confirm('선택하신 댓글을 삭제할까요?')) return false;
                const boardId = [[ ${archive.boardId} ]];
                callApi(`/user/board/archives/${boardId}/comments/${id}`, 'delete');
                alert('삭제되었습니다.');
                findAllComment();
            }

            function drawComments(list) {
                if (!list.length) {
                    $('.cm_list').html('<div class="cm_none"><p>등록된 댓글이 없습니다.</p></div>');
                    return;
                }
                let html = '';
                list.forEach(row => {
                    html += `
                        <div>
                            <input type="checkbox" class="contentCheck" name="chk" value="${row.commentId}" />
                            <p class="writer">
                                <em>${row.writer}</em>
                                <span class="date">${dayjs(row.createdDate).format('YYYY-MM-DD HH:mm')}</span>
                            </p>
                            <div class="cont"><div class="txt_con">${row.content}</div></div>
                            <p class="func_btns">
                                <button type="button" onclick="openCommentUpdatePopup(${row.commentId});" class="btns"><span class="icons icon_modify">수정</span></button>
                                <button type="button" onclick="deleteComment(${row.commentId});" class="btns"><span class="icons icon_del">삭제</span></button>
                            </p>
                        </div>
                    `;
                });
                $('.cm_list').html(html);
            }

            function drawPage(pagination, page) {
                if (!pagination || !page) { $('.paging').html(''); return; }
                let html = '';
                if (pagination.existPrevPage) {
                    html += `
                        <a href="javascript:void(0);" onclick="findAllComment(1)" class="page_bt first">첫 페이지</a>
                        <a href="javascript:void(0);" onclick="findAllComment(${pagination.startPage - 1})" class="page_bt prev">이전 페이지</a>
                    `;
                }
                html += '<p>';
                for (let i = pagination.startPage; i <= pagination.endPage; i++) {
                    html += `<a href="javascript:void(0);" onclick="findAllComment(${i});">${i}</a>`;
                }
                html += '</p>';
                if (pagination.existNextPage) {
                    html += `
                        <a href="javascript:void(0);" onclick="findAllComment(${pagination.endPage + 1});" class="page_bt next">다음 페이지</a>
                        <a href="javascript:void(0);" onclick="findAllComment(${pagination.totalPageCount});" class="page_bt last">마지막 페이지</a>
                    `;
                }
                const paging = $('.paging');
                paging.html(html);
                const currentPage = $('a', paging).filter(function() {
                    return Number($(this).text()) === page || Number($(this).text()) === pagination.totalPageCount;
                }).first();
                currentPage.addClass('on').removeAttr('onclick');
                const boardId = new URLSearchParams(location.search).get('id');
                history.replaceState({}, '', location.pathname + `?id=${boardId}&page=${currentPage.text()}`);
            }

            function findAllFile() {
                const boardId = [[ ${archive.boardId} ]];
                const uri = `/user/board/archives/${boardId}/files`;
                const response = getJson(uri);
                if (!response.length) return;

                let fileHtml = '<div class="file_down"><div class="cont">';
                response.forEach(row => {
                    fileHtml += `<a href="/user/board/archives/${boardId}/files/${row.fileId}/download"><span class="icons"><i class="fas fa-folder-open"></i></span>${row.originalName}</a>`;
                });
                fileHtml += '</div></div>';
                $('#files').html(fileHtml);
            }

            function deleteAll() {
                if ($("input[name='chk']:checked").length < 1) {
                    alert("선택된 항목이 없습니다.");
                    return false;
                }
                const checkedIds = [];
                $("input[name='chk']:checked").each(function() { checkedIds.push($(this).val()); });

                const boardId = [[ ${archive.boardId} ]];
                callApi(`/user/board/archives/comments/`, 'DELETE', checkedIds);
                findAllComment();
            }

        /*]]>*/
        </script>
    </th:block>
</html>
