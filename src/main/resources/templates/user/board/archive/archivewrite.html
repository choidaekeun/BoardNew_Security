<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/basic">
    <th:block layout:fragment="title">
        <title>자료실 글작성</title>
    </th:block>

    <th:block layout:fragment="content">
        <div class="page_tits">
            <h3>게시판 관리</h3>
            <p class="path"><strong>현재 위치 :</strong> <span>게시판</span> <span>자료실</span> <span>글작성</span></p>
        </div>

        <div class="content">
            <section>
                <form id="saveForm" method="post" autocomplete="off" enctype="multipart/form-data">
                    <input type="hidden" id="boardId" name="boardId" th:if="${archive != null}" th:value="${archive.boardId}" />
                    <input type="hidden" id="noticeYn" name="noticeYn" />
                    <input type="hidden" id="removeFileIds" name="removeFileIds" />

                    <table class="tb tb_row">
                        <colgroup>
                            <col style="width:15%;" /><col style="width:35%;" /><col style="width:15%;" /><col style="width:35%;" />
                        </colgroup>
                        <tbody>
                            <tr>
                                <th scope="row">공지글</th>
                                <td><span class="chkbox"><input type="checkbox" id="isNotice" name="isNotice" class="chk" /><i></i><label for="isNotice"> 설정</label></span></td>
                                <th scope="row">등록일</th>
                                <td><input type="text" id="createdDate" name="createdDate" readonly /></td>
                            </tr>
                            <tr>
                                <th>제목 <span class="es">필수 입력</span></th>
                                <td colspan="3"><input type="text" id="title" name="title" maxlength="50" placeholder="제목을 입력해 주세요." /></td>
                            </tr>
                            <tr>
                                <th>이름 <span class="es">필수 입력</span></th>
                                <td colspan="3"><input type="text" id="writer" name="writer" maxlength="10" placeholder="이름을 입력해 주세요." /></td>
                            </tr>
                            <tr>
                                <th>내용 <span class="es">필수 입력</span></th>
                                <td colspan="3"><textarea id="content" name="content" cols="50" rows="10" placeholder="내용을 입력해 주세요."></textarea></td>
                            </tr>
                            <tr>
                                <th>첨부파일</th>
                                <td colspan="3">
                                    <div class="file_list">
                                        <div>
                                            <div class="file_input">
                                                <input type="text" readonly />
                                                <label> 첨부파일
                                                    <input type="file" name="files" onchange="selectFile(this);" />
                                                </label>
                                            </div>
                                            <button type="button" onclick="removeFile(this);" class="btns del_btn"><span>삭제</span></button>
                                            <button type="button" onclick="addFile();" class="btns fn_add_btn"><span>파일 추가</span></button>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </form>
                <p class="btn_set">
                    <button type="button" id="saveBtn" onclick="saveArchive();" class="btns btn_st3 btn_mid">저장</button>
                    <a href="javascript:void(0);" onclick="goListPage();" class="btns btn_bdr3 btn_mid">뒤로</a>
                </p>
            </section>
        </div>
    </th:block>

    <th:block layout:fragment="script">
        <script th:inline="javascript">
        /*<![CDATA[*/

            $(document).ready(function() {
                renderArchiveInfo();
                findAllFile();
            });

            function findAllFile() {
                const archive = [[ ${archive} ]];
                if (!archive) return false;

                const response = getJson(`/user/board/archives/${archive.boardId}/files`);
                if (!response.length) return false;

                for (let i = 0, len = response.length - 1; i < len; i++) addFile();

                const filenameInputs = $('.file_list input[type="text"]');
                filenameInputs.each(function(i, input) {
                    const inputs = $(input);
                    const fileInput = inputs.next().find('input[type="file"]');
                    const fileRemoveBtn = inputs.parent().next();
                    fileInput.attr('onchange', `selectFile(this, ${response[i].fileId})`);
                    fileRemoveBtn.attr('onclick', `removeFile(this, ${response[i].fileId})`);
                    inputs.val(response[i].originalName);
                });
            }

            function renderArchiveInfo() {
                const archive = [[ ${archive} ]];
                if (!archive) {
                    $('#createdDate').val(dayjs().format('YYYY-MM-DD HH:mm'));
                    return false;
                }
                const form = $('#saveForm');
                form.find('[name="isNotice"]').prop('checked', archive.noticeYn);
                form.find('[name="createdDate"]').val(dayjs(archive.createdDate).format('YYYY-MM-DD HH:mm'));
                ['boardId', 'title', 'content', 'writer', 'noticeYn'].forEach(field => {
                    form.find(`[name="${field}"]`).val(archive[field]);
                });
            }

            function goListPage() {
                const queryString = new URLSearchParams(location.search);
                queryString.delete('id');
                location.href = '/user/board/archive/list' + '?' + queryString.toString();
            }

            function saveArchive() {
                const form = $('#saveForm');
                const fields = [form.find('[name="title"]'), form.find('[name="writer"]'), form.find('[name="content"]')];
                const fieldNames = ['제목', '이름', '내용'];
                fields.forEach((field, i) => isValid(field, fieldNames[i]));

                const queryString = new URLSearchParams(location.search);
                queryString.delete('id');
                let inputHtml = '';
                queryString.forEach((value, key) => {
                    inputHtml += `<input type="hidden" name="${key}" value="${value}" />`;
                });
                form.append($(inputHtml));

                $('#saveBtn').prop('disabled', true);
                form.find('[name="noticeYn"]').val(form.find('[name="isNotice"]').prop('checked'));
                form.find('[name="removeFileIds"]').val(removeFileId.getAll().join());
                form.attr('action', [[ ${archive == null} ]] ? '/user/board/archive/save' : '/user/board/archive/update');
                form.submit();
            }

            const removeFileId = (function() {
                const ids = [];
                return {
                    add(id) { if (!ids.includes(id)) ids.push(id); },
                    getAll() { return ids; }
                };
            }());

            function selectFile(element, id) {
                const elements = $(element);
                const file = elements[0].files[0];
                const filename = elements.closest('.file_input').find('input[type="text"]');
                if (!file) { filename.val(''); return false; }
                const fileSize = Math.floor(file.size / 1024 / 1024);
                if (fileSize > 10) {
                    alert('10MB 이하의 파일로 업로드해 주세요.');
                    filename.val(''); elements.val(''); return false;
                }
                filename.val(file.name);
                if (id) removeFileId.add(id);
            }

            function addFile() {
                const fileDiv = $('<div></div>');
                fileDiv.html(`
                    <div class="file_input">
                        <input type="text" readonly />
                        <label> 첨부파일
                            <input type="file" name="files" onchange="selectFile(this);" />
                        </label>
                    </div>
                    <button type="button" onclick="removeFile(this);" class="btns del_btn"><span>삭제</span></button>
                `);
                $('.file_list').append(fileDiv);
            }

            function removeFile(element, id) {
                const elements = $(element);
                if (id) removeFileId.add(id);
                const fileAddBtn = elements.next();
                if (fileAddBtn.length) {
                    elements.prev().find('input').val('');
                    return false;
                }
                elements.parent().remove();
            }

        /*]]>*/
        </script>
    </th:block>
</html>
