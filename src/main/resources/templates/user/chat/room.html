<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{room.name}}</title>
	<script type="text/javascript" src="http://code.jquery.com/jquery-latest.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <th:block th:fragment="content">
        <div class="container">
            <div class="col-6">
                <h1>[[${room.name}]]</h1>
            </div>
            <div>
                <div id="msgArea" class="col"></div>
                <div class="col-6">
                    <div class="input-group mb-3">
                        <input type="text" id="msg" class="form-control">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" type="button" id="button-send">전송</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6"></div>
        </div>
    </th:block>

<script>
$(document).ready(function(){
	
	var username = "";
	while (!username) {
		username = prompt("사용할 닉네임을 입력하세요.");
	}
	var roomName = "[[${room.name}]]";
	var roomId = "[[${room.roomId}]]";

    var sockJs = new SockJS("/stomp/chat");
	
  	//1. SockJS를 내부에 들고있는 stomp를 내어줌
    var stomp = Stomp.over(sockJs);

    //2. connection이 맺어지면 실행
    stomp.connect({}, function (){ console.log("STOMP Connection")
       
       //4. subscribe(path, callback)으로 메세지를 받을 수 있음
       stomp.subscribe("/sub/chat/room/" + roomId, function (chat) {

            var content = JSON.parse(chat.body);
            var str = '';

//            console.log('Parsed content:', content);
//            console.log('Is content an array?', Array.isArray(content));

			if (Array.isArray(content)) { // 채팅 히스토리 출력
        	   content.forEach(row => {
				appendMessage(row.writer, row.message, row.writer === username);
				});
           
   		    }else { // 채팅방 입장 또는 실시간 출력
   		    	var writer = content.writer;
            	var message = content.message;
   		    	
            	appendMessage(writer, message, writer === username);
			}
			
			function appendMessage(writer, message, isUser) {
				var alertClass = isUser ? 'alert-secondary' : 'alert-warning';
				str += "<div class='col-6'>";
		        str += `<div class='alert ${alertClass}'>`;
		        str += `<b>${writer} : ${message}</b>`;
		        str += "</div></div>";
			}
           
           $("#msgArea").append(str);
           
       });

       //3. send(path, header, message)로 메세지를 보낼 수 있음
       stomp.send('/pub/chat/enter', {}, JSON.stringify({roomId: roomId, writer: username}))
    });

    $("#button-send").on("click", function(e){
        
    	var msg = $('#msg');
//         console.log(username + ":" + msg.val());
        stomp.send('/pub/chat/message', {}, JSON.stringify({roomId: roomId, message: msg.val(), writer: username}));
        msg.val('');
    });
});
</script>

</body>
</html>
