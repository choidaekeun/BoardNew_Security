<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${room.name}">채팅방</title>
	<script type="text/javascript" src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <th:block th:fragment="content">
        <div class="container">
            <div class="col-6 d-flex align-items-center justify-content-between">
                <h1>[[${room.name}]]</h1>
                <button class="btn btn-danger btn-sm" id="button-leave">나가기</button>
            </div>
            <div>
                <div id="msgArea" class="col"></div>
                <div class="col-6">
                    <div class="input-group mb-3">
                        <input type="text" id="msg" class="form-control">
                        <div class="input-group-append">
                            <button class="btn btn-primary" type="button" id="button-send">전송</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6"></div>
        </div>
    </th:block>

<script>
$(document).ready(function(){
	
	var roomName = "[[${room.name}]]";
	var roomId = "[[${room.roomId}]]";
	var username = "";

	var memberInfo = null;
	$.ajax({
		url: '/user/chat/member',
		type: 'GET',
		data: { roomId: roomId },
		async: false,
		success: function(data) { memberInfo = data; }
	});

	if (memberInfo) {
		username = memberInfo.writer;
	} else {
		while (!username) {
			var input = prompt("사용할 닉네임을 입력하세요.");
			if (input === null) { window.close(); return; }
			username = input.trim();
		}
	}

    var sockJs = new SockJS("/stomp/chat");
	
  	//1. SockJS를 내부에 들고있는 stomp를 내어줌
    var stomp = Stomp.over(sockJs);

    //2. connection이 맺어지면 실행
    stomp.connect({}, function (){ console.log("STOMP Connection")
       
       //3. subscribe(path, callback)으로 메세지를 받을 수 있음
       stomp.subscribe("/sub/chat/room/" + roomId, function (chat) {
            var content = JSON.parse(chat.body);
            var writer = content.writer;
            var message = content.message;
            appendMessage(writer, message, writer === username);
       });

       //4. 히스토리 조회 및 출력 완료 후 입장 메시지 발송
       $.ajax({
           url: '/user/chat/messages',
           type: 'GET',
           data: {roomId: roomId},
           success: function(history) {
               history.forEach(function(row) {
                   appendMessage(row.writer, row.message, row.writer === username);
               });
               //5. 히스토리 출력 완료 후 입장 메시지 발송
               if (!memberInfo) stomp.send('/pub/chat/enter', {}, JSON.stringify({roomId: roomId, writer: username}));
           }
       });
    });

    function appendMessage(writer, message, isUser) {
        var alertClass = isUser ? 'alert-secondary' : 'alert-warning';
        var str = "<div class='col-6'>";
        str += `<div class='alert ${alertClass}'>`;
        str += `<b>${writer} : ${message}</b>`;
        str += "</div></div>";
        $("#msgArea").append(str);
    }

    function sendMessage() {
        var msg = $('#msg');
        if (!msg.val().trim()) return;
        stomp.send('/pub/chat/message', {}, JSON.stringify({roomId: roomId, message: msg.val(), writer: username}));
        msg.val('');
    }

    $("#button-send").on("click", function() {
        sendMessage();
    });

    $("#msg").on("keydown", function(e) {
        if (e.keyCode === 13) sendMessage();
    });

    //채팅방 나가기
    $("#button-leave").on("click", function() {
        if (!confirm('채팅방을 나가시겠습니까?')) return;
        stomp.send('/pub/chat/leave', {}, JSON.stringify({roomId: roomId, writer: username}));
        setTimeout(function() {
            stomp.disconnect(function() { // STOMP 세션 종료
                window.close();
            });
        }, 300);
    });
});
</script>

</body>
</html>
